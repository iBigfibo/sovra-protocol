<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sovra – Nigeria Vault Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#090e1a;color:#f0f4ff;font-family:'Inter',sans-serif;padding:2rem;}
    .container{max-width:900px;margin:0 auto;}
    .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid rgba(201,168,76,0.2);}
    .logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;letter-spacing:0.08em;}
    .logo span{background:linear-gradient(135deg,#c9a84c,#e8c878);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .btn-outline{border:1px solid rgba(201,168,76,0.4);padding:6px 18px;border-radius:40px;font-size:14px;text-decoration:none;color:#e8c878;}
    .vault-card{background:#0c1424;border:1px solid rgba(201,168,76,0.2);border-radius:28px;overflow:hidden;}
    .vault-header{background:#162035;padding:18px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid rgba(201,168,76,0.2);}
    .vault-country{display:flex;align-items:center;gap:12px;}
    .vault-flag{font-size:32px;}
    .vault-name{font-weight:600;font-size:20px;}
    .vault-type{font-family:monospace;font-size:11px;color:#e8c878;}
    .vault-badge{background:rgba(201,168,76,0.15);padding:4px 12px;border-radius:40px;font-size:12px;}
    .vault-body{padding:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:24px;align-items:center;}
    .vault-stats{display:flex;gap:40px;}
    .stat-label-sm{font-family:monospace;font-size:10px;color:#7a90b0;}
    .stat-value-lg{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:#e8c878;}
    .user-balance{background:#162035;padding:10px 24px;border-radius:40px;font-size:14px;}
    .user-balance span{font-weight:700;color:#e8c878;font-size:18px;}
    .simulate-panel{background:#0c1424;border-radius:24px;padding:24px;margin-top:24px;}
    .simulate-row{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:20px;}
    .input-group{flex:1;}
    .input-group label{font-size:11px;color:#7a90b0;display:block;margin-bottom:6px;}
    .input-group input,.input-group select{width:100%;background:#162035;border:1px solid #2a3a55;padding:12px;border-radius:20px;color:white;}
    .result-box{background:#0a101c;border-radius:20px;padding:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;}
    .net-yield{text-align:right;}
    .net-yield div{font-size:28px;font-weight:700;color:#e8c878;}
    .btn-deposit{background:linear-gradient(135deg,#c9a84c,#e8c878);border:none;padding:12px 28px;border-radius:40px;font-weight:600;color:#090e1a;cursor:pointer;}
    footer{margin-top:3rem;text-align:center;font-size:12px;color:#6e7fa0;}
    @media(max-width:700px){.vault-body{flex-direction:column;align-items:stretch;}.result-box{flex-direction:column;text-align:left;}.net-yield{text-align:left;}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">S<span>O</span>VRA</div>
    <a href="/" class="btn-outline">← Back to site</a>
  </div>
  <div class="user-balance" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <span>💰 YOUR BALANCE</span>
    <span id="userBalanceDisplay">$0</span>
  </div>
  <div class="vault-card">
    <div class="vault-header">
      <div class="vault-country"><span class="vault-flag">🇳🇬</span><div><div class="vault-name">Nigeria Sovereign Vault</div><div class="vault-type">FGN Eurobond 2030 · 10% coupon</div></div></div>
      <div class="vault-badge">🟢 Live</div>
    </div>
    <div class="vault-body">
      <div class="vault-stats">
        <div><div class="stat-label-sm">Gross Yield</div><div class="stat-value-lg">10.00%</div></div>
        <div><div class="stat-label-sm">Net APY</div><div class="stat-value-lg">8.41%</div></div>
      </div>
      <button id="realDepositBtn" class="btn-deposit">Deposit USDC →</button>
    </div>
  </div>
  <div class="simulate-panel">
    <h3 style="margin-bottom:16px;">📊 Calculate your yield</h3>
    <div class="simulate-row">
      <div class="input-group"><label>Deposit Amount (USDC)</label><input type="number" id="depositAmount" value="10000" step="1000"></div>
      <div class="input-group"><label>Payout frequency</label><select id="payoutFreq"><option value="monthly">Monthly</option><option value="quarterly">Quarterly</option><option value="halfyearly">Half‑yearly</option><option value="annually">Annually</option></select></div>
    </div>
    <div class="result-box">
      <div><div>💰 Deposit fee (0.1%): <span id="depositFeePreview">$10.00</span></div><div style="font-size:12px;margin-top:6px;">Withdrawal fee: 0.1%</div></div>
      <div class="net-yield"><div>Your net yield</div><div id="netYieldPreview">$70.00</div><div id="periodLabel">per month</div><div style="font-size:11px;">≡ 8.41% APY</div></div>
    </div>
  </div>
  <footer>Real bonds · No KYC · Withdraw anytime</footer>
</div>
<script>
  let userBalance = 0;
  const balanceEl = document.getElementById('userBalanceDisplay');
  function updateBalance() { balanceEl.innerText = `$${userBalance.toLocaleString()}`; }
  document.getElementById('realDepositBtn').addEventListener('click', () => {
    let amount = parseFloat(document.getElementById('depositAmount').value);
    if (isNaN(amount) || amount <= 0) { alert('Enter valid amount'); return; }
    userBalance += amount;
    updateBalance();
    alert(`Deposited $${amount.toLocaleString()} USDC (simulated). 90% → bonds, 10% reserve.`);
  });
  const amt = document.getElementById('depositAmount');
  const freq = document.getElementById('payoutFreq');
  function sim() {
    let deposit = parseFloat(amt.value) || 0;
    const fee = deposit * 0.001;
    document.getElementById('depositFeePreview').innerText = `$${fee.toFixed(2)}`;
    const netDeposit = deposit - fee;
    const deployed = netDeposit * 0.9;
    const gross = deployed * 0.10;
    const netYield = gross * (1 - 0.0657);
    let period = netYield, label = 'per year';
    if (freq.value === 'monthly') { period = netYield / 12; label = 'per month'; }
    else if (freq.value === 'quarterly') { period = netYield / 4; label = 'per quarter'; }
    else if (freq.value === 'halfyearly') { period = netYield / 2; label = 'per half‑year'; }
    document.getElementById('netYieldPreview').innerText = `$${period.toFixed(2)}`;
    document.getElementById('periodLabel').innerText = label;
  }
  amt.addEventListener('input', sim);
  freq.addEventListener('change', sim);
  sim();
  updateBalance();
</script>
</body>
</html>
